name: Build geosite.dat and geoip.dat

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geosite.dat
        run: |
          git clone https://github.com/v2fly/domain-list-community.git builder-site
          cp data/hifznet builder-site/data/hifznet
          cp data/hifznet-block builder-site/data/hifznet-block
          cd builder-site
          go run ./ --outputdir=../ --datapath=./data --exportlists=hifznet,hifznet-block
          cd ..
          mv dlc.dat geosite.dat
          sha256sum geosite.dat > geosite.dat.sha256sum
          ls -lh geosite.dat

      - name: Download geoip.dat from v2fly
        run: |
          wget -O geoip.dat https://github.com/v2fly/geoip/releases/latest/download/geoip.dat
          sha256sum geoip.dat > geoip.dat.sha256sum
          ls -lh geoip.dat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: |
            geosite.dat
            geosite.dat.sha256sum
            geoip.dat
            geoip.dat.sha256sum
          body: |
            HifzNet routing files - auto built.
            geosite.dat: hifznet (RU direct) + hifznet-block (blocked)
            geoip.dat: v2fly latest (monthly updated)
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

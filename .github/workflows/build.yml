name: Build geosite.dat and geoip.dat

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - 'asn/**'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geosite.dat
        run: |
          git clone https://github.com/v2fly/domain-list-community.git builder-site
          cp data/hifznet builder-site/data/hifznet
          cp data/hifznet-block builder-site/data/hifznet-block
          cp data/hifznet-ads-block builder-site/data/hifznet-ads-block
          cp data/win-spy builder-site/data/win-spy
          cd builder-site
          go run ./ --outputdir=../ --datapath=./data --exportlists=hifznet,hifznet-block,hifznet-ads-block,win-spy,geolocation-ru
          cd ..
          mv dlc.dat geosite.dat
          sha256sum geosite.dat > geosite.dat.sha256sum
          ls -lh geosite.dat
    
      - name: Fetch IP ranges from RIPE by ASN
        run: |
          mkdir -p tmp-geoip
          > tmp-geoip/hifznet-direct.txt
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "$line" ]] && continue
            echo "Fetching AS${line}..."
            curl -s --retry 3 --retry-delay 2 \
              "https://stat.ripe.net/data/announced-prefixes/data.json?resource=AS${line}" \
              | python3 -c "import sys,json; [print(p['prefix']) for p in json.load(sys.stdin).get('data',{}).get('prefixes',[])]" \
              >> tmp-geoip/hifznet-direct.txt 2>/dev/null || true
            sleep 1
          done < asn/russian-services.txt
          sort -u tmp-geoip/hifznet-direct.txt | grep -v "^$" > tmp-geoip/hifznet-direct-clean.txt
          echo "Total CIDR ranges: $(wc -l < tmp-geoip/hifznet-direct-clean.txt)"

      - name: Build geoip.dat with hifznet-direct category
        run: |
          git clone https://github.com/v2fly/geoip.git builder-geoip
          cd builder-geoip && go build -o ../geoip-tool . && cd ..
          mkdir -p geoip-data output-geoip
          cp tmp-geoip/hifznet-direct-clean.txt geoip-data/hifznet-direct
          wget -q -O geoip-country.dat https://github.com/v2fly/geoip/releases/latest/download/geoip.dat
          cat > geoip-config.json << JSONEOF
          {
            "input": [
              {"type":"v2rayGeoIPDat","action":"add","args":{"uri":"./geoip-country.dat","wantedList":["ru","private"]}},
              {"type":"text","action":"add","args":{"name":"hifznet-direct","uri":"./geoip-data/hifznet-direct"}}
            ],
            "output": [
              {"type":"v2rayGeoIPDat","action":"output","args":{"outputDir":"./output-geoip","outputName":"geoip.dat"}}
            ]
          }
          JSONEOF
          ./geoip-tool -c geoip-config.json
          cp output-geoip/geoip.dat ./geoip.dat
          sha256sum geoip.dat > geoip.dat.sha256sum
          ls -lh geoip.dat

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: |
            geosite.dat
            geosite.dat.sha256sum
            geoip.dat
            geoip.dat.sha256sum
          body: |
            HifzNet routing files - auto built.

            **geosite.dat** categories:
            - `geosite:hifznet` â Russian domains + foreign RU service infrastructure (direct)
            - `geosite:hifznet-block` â strict block: extremism + terrorism + torrents
            - `geosite:hifznet-ads-block` â optional block: ads, trackers, analytics

            **geoip.dat** categories:
            - `geoip:ru` â standard Russian IP ranges
            - `geoip:private` â local/private networks
            - `geoip:hifznet-direct` â foreign IPs of Yandex/VK/Sber/Ozon/WB by ASN

            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
